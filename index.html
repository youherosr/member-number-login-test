<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <title>會員號碼申請系統 | Member Number Request</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, "Noto Sans TC", "Microsoft JhengHei", sans-serif;
      background: linear-gradient(135deg, #f6faf7 0%, #fff8f1 100%);
    }

    .wrapper {
      max-width: 860px;
      margin: 36px auto;
      padding: 18px;
    }

    .card {
      background: white;
      border-radius: 22px;
      box-shadow: 0 16px 40px rgba(55, 84, 62, 0.12);
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #2f7d4a 0%, #ee8b2d 100%);
      color: white;
      padding: 30px;
    }

    .header h1 {
      margin: 0;
      font-size: 28px;
    }

    .content {
      padding: 28px;
    }

    .status-box {
      display: none;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    .status-success { background:#eef8f1; }
    .status-error { background:#fff4f1; }
    .status-loading { background:#fff8ef; }

    .form-card {
      display: none;
      margin-top: 20px;
      padding: 20px;
      border-radius: 14px;
      border: 1px solid #eee;
      background: #fafafa;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 8px;
      border-radius: 10px;
      border: 1px solid #ccc;
    }

    button {
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }

    .primary-btn {
      background: #2f7d4a;
      color: white;
    }

    .secondary-btn {
      background: #fff4e8;
      display: none;
    }

    .result-card {
      display: none;
      margin-top: 14px;
      padding: 16px;
      border-radius: 14px;
    }

    .result-success { background:#eef9f1; }
    .result-error { background:#fff4f1; }
    .result-loading { background:#fff8ef; }

    .number-item {
      padding: 10px;
      background: white;
      margin-top: 8px;
      border-radius: 10px;
      border: 1px solid #ddd;
      font-weight: bold;
      text-align: center;
    }

  </style>
</head>

<body>
<div class="wrapper">
<div class="card">

<div class="header">
  <h1>會員號碼申請系統</h1>
</div>

<div class="content">

  <!-- LOGIN -->
  <div id="g_id_onload"
       data-client_id="663272088961-8khaah34cj9bsvesuing05a84djeorh0.apps.googleusercontent.com"
       data-callback="handleCredentialResponse">
  </div>

  <div class="g_id_signin"></div>

  <div id="statusBox" class="status-box"></div>

  <!-- FORM -->
  <div id="formArea" class="form-card">

    <input id="center" placeholder="報單中心編號">
    <input id="personName" placeholder="負責人姓名">
    <input id="qty" type="number" value="1">

    <br><br>

    <button id="submitBtn" class="primary-btn" onclick="submitRequest()">提交申請</button>
    <button id="copyBtn" class="secondary-btn" onclick="copyNumbers()">複製號碼</button>

    <!-- RESULT MOVED HERE -->
    <div id="result" class="result-card"></div>

  </div>

</div>
</div>
</div>

<script>

const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbwsQq96WMhIV3Kh0nXMBZmugD51SOn5N0aUfc1KjKQ_E8SkalbR7ZRTBm1sS8rCV58zWw/exec';

let email = '';
let numbers = [];

function handleCredentialResponse(res) {
  const data = JSON.parse(atob(res.credential.split('.')[1]));
  email = data.email;

  showStatus("Checking approval...", "loading");
  checkApproval();
}

function checkApproval() {
  const cb = 'cb_' + Date.now();

  window[cb] = function(r) {
    if (r.approved) {
      showStatus("Approved", "success");
      document.getElementById("formArea").style.display = "block";
    } else {
      showStatus("Not authorized", "error");
    }
  };

  const s = document.createElement('script');
  s.src = BACKEND_URL + '?action=checkUser&email='+email+'&callback='+cb;
  document.body.appendChild(s);
}

function submitRequest() {
  const center = document.getElementById('center').value;
  const name = document.getElementById('personName').value;
  const qty = document.getElementById('qty').value;

  showResult("Processing...", "loading");

  const cb = 'cb2_' + Date.now();

  window[cb] = function(r) {

    if (r.success) {
      numbers = r.numbers;

      let html = "<b>Success</b><br>";

      numbers.forEach(n=>{
        html += `<div class="number-item">${n}</div>`;
      });

      document.getElementById("copyBtn").style.display="inline-block";

      showResult(html, "success");

    } else {
      showResult(r.message, "error");
    }

    document.getElementById('result').scrollIntoView({behavior:'smooth'});
  };

  const s = document.createElement('script');
  s.src = BACKEND_URL +
    '?action=assign&email='+email+
    '&center='+center+
    '&name='+name+
    '&qty='+qty+
    '&callback='+cb;

  document.body.appendChild(s);
}

function showStatus(msg, type) {
  const box = document.getElementById('statusBox');
  box.style.display="block";
  box.className='status-box status-'+type;
  box.innerHTML=msg;
}

function showResult(msg, type) {
  const box = document.getElementById('result');
  box.style.display="block";
  box.className='result-card result-'+type;
  box.innerHTML=msg;
}

function copyNumbers() {
  navigator.clipboard.writeText(numbers.join(", "));
}

</script>

</body>
</html>
